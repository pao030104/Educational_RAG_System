<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduRAG 智慧问答</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ========== CSS Variables ========== */
    :root {
      --bg: #f3f3f8;
      --sidebar-bg: #1e1e2e;
      --sidebar-hover: #2a2a3d;
      --sidebar-active: #33334d;
      --sidebar-text: #a0a0b8;
      --sidebar-text-active: #e0e0f0;
      --card-bg: #ffffff;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.06);
      --user-bubble-start: #4f6ef6;
      --user-bubble-end: #7c5cfc;
      --ai-bubble-bg: #ffffff;
      --ai-bubble-shadow: 0 2px 10px rgba(0,0,0,0.05);
      --input-bg: #ffffff;
      --input-shadow: 0 -2px 20px rgba(0,0,0,0.04);
      --border: #e8e8ee;
      --text-primary: #1a1a2e;
      --text-secondary: #6b6b80;
      --text-muted: #9999aa;
      --accent: #4f6ef6;
      --accent-hover: #3d5ce5;
      --danger: #e0556a;
      --code-bg: #1e1e2e;
      --sidebar-width: 268px;
      --header-height: 56px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --radius: 14px;
      --radius-sm: 8px;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                   'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    }

    /* ========== Reset ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== Scrollbar ========== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8c8d4; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8b8; }

    /* ========== Sidebar ========== */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100%;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      color: var(--sidebar-text);
      transition: transform var(--transition), opacity var(--transition);
      z-index: 100;
    }
    .sidebar-header {
      padding: 16px 14px 10px;
    }
    .btn-new-chat {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity var(--transition), transform var(--transition);
    }
    .btn-new-chat:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-new-chat:active { transform: scale(0.98); }
    .btn-new-chat svg { width: 18px; height: 18px; flex-shrink: 0; }

    .sidebar-sessions {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }
    .session-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
      position: relative;
      margin-bottom: 2px;
      gap: 8px;
    }
    .session-item:hover { background: var(--sidebar-hover); }
    .session-item.active { background: var(--sidebar-active); color: var(--sidebar-text-active); }
    .session-item .session-icon {
      width: 20px; height: 20px; flex-shrink: 0;
      opacity: 0.5; display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    .session-item .session-preview {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      line-height: 1.4;
    }
    .session-item .session-time {
      font-size: 11px;
      opacity: 0.5;
      flex-shrink: 0;
    }
    .session-item .btn-delete-session {
      display: none;
      width: 24px; height: 24px;
      border: none; background: transparent;
      color: var(--danger);
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      line-height: 24px; text-align: center;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity var(--transition);
    }
    .session-item:hover .btn-delete-session { display: block; }
    .session-item .btn-delete-session:hover { opacity: 1; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
    }
    .sidebar-footer .session-id-display {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      opacity: 0.4; margin-bottom: 8px;
    }
    .sidebar-footer .btn-clear {
      width: 100%; padding: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: var(--sidebar-text);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      transition: all var(--transition);
    }
    .sidebar-footer .btn-clear:hover {
      background: rgba(231, 76, 60, 0.15);
      border-color: rgba(231, 76, 60, 0.3);
      color: var(--danger);
    }

    /* ========== Main Area ========== */
    .main {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      min-width: 0;
    }

    /* ========== Header ========== */
    .header {
      height: var(--header-height);
      min-height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-menu {
      display: none;
      width: 36px; height: 36px;
      border: none; background: transparent;
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 20px;
      color: var(--text-secondary);
      align-items: center; justify-content: center;
    }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }
    .header-title .logo-icon { margin-right: 6px; }
    .header-source-tag {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: #eef0ff;
      color: var(--accent);
    }

    /* ========== Messages ========== */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      scroll-behavior: smooth;
    }
    .messages-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Welcome */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    .welcome-logo {
      width: 80px; height: 80px;
      margin-bottom: 20px;
      font-size: 48px;
      line-height: 80px;
      background: linear-gradient(135deg, #eef0ff 0%, #f5f0ff 100%);
      border-radius: 24px;
      animation: welcome-bounce 0.6s ease-out;
    }
    @keyframes welcome-bounce {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }
    .welcome h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .welcome .slogan {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 32px;
    }
    .welcome-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 520px;
    }
    .welcome-card {
      padding: 14px 22px;
      border-radius: var(--radius);
      background: var(--card-bg);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: var(--card-shadow);
    }
    .welcome-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Message bubbles */
    .msg-row {
      display: flex;
      gap: 12px;
      animation: msg-in 0.3s ease-out;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-top: 2px;
    }
    .msg-avatar.ai {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .msg-avatar.user {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }
    .msg-bubble {
      max-width: 75%;
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.65;
      word-break: break-word;
      position: relative;
    }
    .msg-row.user .msg-bubble {
      background: linear-gradient(135deg, var(--user-bubble-start), var(--user-bubble-end));
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.ai .msg-bubble {
      background: var(--ai-bubble-bg);
      box-shadow: var(--ai-bubble-shadow);
      border: 1px solid #eeeef4;
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #c0c0d0;
      animation: dot-bounce 1.4s infinite ease-in-out both;
    }
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.5); }
      40% { transform: scale(1); }
    }
    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 16px;
      background: var(--text-primary);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.8s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ========== Markdown in AI bubbles ========== */
    .msg-bubble.ai h1, .msg-bubble.ai h2, .msg-bubble.ai h3 {
      margin: 12px 0 6px;
      font-size: 1.05em;
    }
    .msg-bubble.ai ul, .msg-bubble.ai ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .msg-bubble.ai li { margin: 2px 0; }
    .msg-bubble.ai strong { font-weight: 600; }
    .msg-bubble.ai code {
      font-family: var(--font-mono);
      font-size: 0.9em;
      background: #f3f3f7;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .msg-bubble.ai pre {
      background: var(--code-bg);
      color: #e0e0f0;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 10px 0;
      position: relative;
      font-size: 13px;
      line-height: 1.5;
    }
    .msg-bubble.ai pre code {
      background: transparent;
      padding: 0;
      font-family: var(--font-mono);
      color: inherit;
    }
    .code-block-wrapper {
      position: relative;
      margin: 10px 0;
    }
    .code-block-wrapper pre { margin: 0; }
    .btn-copy {
      position: absolute;
      top: 8px; right: 8px;
      padding: 4px 10px;
      font-size: 11px;
      background: rgba(255,255,255,0.1);
      color: #c0c0d0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--transition);
      font-family: var(--font-sans);
    }
    .code-block-wrapper:hover .btn-copy { opacity: 1; }
    .btn-copy:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* ========== Input Area ========== */
    .input-area {
      padding: 16px 28px 24px;
      background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
    }
    .input-inner {
      max-width: 800px;
      margin: 0 auto;
    }
    .source-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .source-pill {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      transition: all var(--transition);
      white-space: nowrap;
    }
    .source-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .source-pill.active {
      background: #eef0ff;
      border-color: var(--accent);
      color: var(--accent);
    }
    .source-pill.all {
      font-style: italic;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--input-bg);
      border-radius: var(--radius);
      padding: 8px 8px 8px 18px;
      box-shadow: var(--input-shadow);
      border: 1px solid var(--border);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,110,246,0.1), var(--input-shadow);
    }
    .input-row textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-sans);
      font-size: 14.5px;
      line-height: 1.5;
      padding: 6px 0;
      max-height: 150px;
      background: transparent;
      color: var(--text-primary);
    }
    .input-row textarea::placeholder { color: var(--text-muted); }
    .btn-send {
      width: 40px; height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .btn-send:hover { background: var(--accent-hover); transform: scale(1.04); }
    .btn-send:disabled {
      background: #d0d0dc;
      cursor: not-allowed;
      transform: none;
    }
    .btn-send svg { width: 18px; height: 18px; }
    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ========== Mobile Overlay ========== */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 99;
    }
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 999;
      animation: toast-in 0.3s ease-out;
      pointer-events: none;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ========== Responsive ========== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        opacity: 0;
      }
      .sidebar.open {
        transform: translateX(0);
        opacity: 1;
      }
      .sidebar-overlay.show { display: block; }
      .btn-menu { display: flex; }
      .header { padding: 0 16px; }
      .header-title { font-size: 15px; }
      .messages-inner { padding: 0 16px; }
      .input-area { padding: 12px 16px 20px; }
      .msg-bubble { max-width: 85%; }
      .welcome-cards { gap: 8px; }
      .welcome-card { padding: 10px 16px; font-size: 13px; }
    }
  
    /* ========== Source Citations ========== */
    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      margin: 2px 4px 2px 0;
      border-radius: 20px;
      background: #eef0ff;
      color: #4f5bd5;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid #dde0ff;
      white-space: nowrap;
    }
    .source-badge svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }
    .sources-container {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 2px;
    }
    .sources-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-right: 4px;
    }
    /* Typing cursor */
    .typing-cursor::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

</style>
</head>
<body>

  <!-- ==================== Sidebar Overlay (Mobile) ==================== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ==================== Sidebar ==================== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="btn-new-chat" id="btnNewChat" title="新建对话 (Ctrl+N)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新对话
      </button>
    </div>
    <div class="sidebar-sessions" id="sessionList"></div>
    <div class="sidebar-footer">
      <div class="session-id-display" id="sessionIdDisplay" title="当前会话 ID">--</div>
      <button class="btn-clear" id="btnClearSession">🗑 清空当前对话</button>
    </div>
  </aside>

  <!-- ==================== Main Chat ==================== -->
  <main class="main">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="btn-menu" id="btnMenu" aria-label="菜单">☰</button>
        <span class="header-title">
          <span class="logo-icon">🎓</span>EduRAG 智慧问答
        </span>
      </div>
      <span class="header-source-tag" id="headerSourceTag">全部学科</span>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner">
        <!-- Welcome screen (shown when no messages) -->
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-logo">🎓</div>
          <h1>EduRAG 智慧问答</h1>
          <p class="slogan">教育领域的智能知识助手，快速精准解答您的学习疑问</p>
          <div class="welcome-cards" id="welcomeCards"></div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-inner">
        <div class="source-pills" id="sourcePills"></div>
        <div class="input-row">
          <textarea
            id="queryInput"
            rows="1"
            placeholder="输入你的问题… (Enter 发送, Shift+Enter 换行)"
            autofocus
          ></textarea>
          <button class="btn-send" id="btnSend" disabled title="发送">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter 发送 · Shift+Enter 换行 · Ctrl+N 新对话</div>
      </div>
    </div>
  </main>

  <!-- ==================== Application Logic ==================== -->
  <script>
  (function() {
    // ========== State ==========
    const state = {
      sessionId: '',
      messages: [],       // { role: 'user'|'ai', content: string }
      sources: [],
      sourceFilter: null, // null = all
      sessions: [],       // sidebar list
      isLoading: false,
      typingAnimId: null,
    };

    // ========== DOM Refs ==========
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);
    const sidebar = $('#sidebar');
    const sidebarOverlay = $('#sidebarOverlay');
    const sessionList = $('#sessionList');
    const sessionIdDisplay = $('#sessionIdDisplay');
    const messagesEl = $('#messages');
    const messagesInner = $('#messagesInner');
    const welcomeScreen = $('#welcomeScreen');
    const sourcePills = $('#sourcePills');
    const headerSourceTag = $('#headerSourceTag');
    const queryInput = $('#queryInput');
    const btnSend = $('#btnSend');
    const welcomeCards = $('#welcomeCards');

    // ========== Helpers ==========
    function genSessionId() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    function formatTime(ts) {
      if (!ts) return '';
      try {
        const d = new Date(ts.replace(' ', 'T'));
        if (isNaN(d.getTime())) return ts.slice(0, 16);
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
        if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
        const m = d.getMonth() + 1, day = d.getDate();
        return m + '/' + day;
      } catch { return ts; }
    }

    function truncate(str, max) {
      return str && str.length > max ? str.slice(0, max) + '…' : str;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== Toast ==========
    function toast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.remove(); }, 2000);
    }

    // ========== API ==========
    async function apiSources() {
      const r = await fetch('/api/sources');
      const d = await r.json();
      return d.sources || [];
    }

    async function apiConversations() {
      const r = await fetch('/api/conversations');
      return await r.json();
    }

    async function apiHistory(sid) {
      const r = await fetch('/api/history/' + encodeURIComponent(sid));
      return await r.json();
    }

    async function apiClearHistory(sid) {
      const r = await fetch('/api/history/' + encodeURIComponent(sid), { method: 'DELETE' });
      return await r.json();
    }

    async function apiChat(query, sourceFilter, sessionId) {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, source_filter: sourceFilter, session_id: sessionId }),
      });
      return resp;
    }

    // ========== Scroll to Bottom ==========
    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ========== Markdown Rendering ==========
    function renderMarkdown(text) {
      if (!text) return '';
      try {
        let html = marked.parse(text);
        // Wrap code blocks for copy button
        html = html.replace(/<pre><code(\s[^>]*)?>/g, (m) => {
          return '<div class="code-block-wrapper"><pre><code' + (m.includes('<code ') ? m.slice(m.indexOf('<code ') + 5) : '>');
        });
        html = html.replace(/<\/code><\/pre>/g, '</code></pre></div>');
        return html;
      } catch {
        return escapeHtml(text).replace(/\n/g, '<br>');
      }
    }

    // ========== Rendering ==========
    function renderSources() {
      // Pills
      sourcePills.innerHTML = '';
      const all = document.createElement('span');
      all.className = 'source-pill all' + (state.sourceFilter === null ? ' active' : '');
      all.textContent = '全部';
      all.onclick = () => setSourceFilter(null);
      sourcePills.appendChild(all);

      state.sources.forEach(s => {
        const pill = document.createElement('span');
        pill.className = 'source-pill' + (state.sourceFilter === s ? ' active' : '');
        pill.textContent = s;
        pill.onclick = () => setSourceFilter(s);
        sourcePills.appendChild(pill);
      });

      // Header tag
      headerSourceTag.textContent = state.sourceFilter || '全部学科';
    }

    function setSourceFilter(source) {
      state.sourceFilter = source;
      renderSources();
    }

    function renderSessionId() {
      sessionIdDisplay.textContent = state.sessionId ? '会话: ' + state.sessionId.slice(0, 8) + '…' : '--';
    }

    function renderWelcomeCards() {
      welcomeCards.innerHTML = '';
      state.sources.forEach(s => {
        const card = document.createElement('div');
        card.className = 'welcome-card';
        card.textContent = '📚 ' + s + ' 学科';
        card.onclick = () => {
          setSourceFilter(s);
          queryInput.focus();
        };
        welcomeCards.appendChild(card);
      });
    }

    function renderSessionList() {
      sessionList.innerHTML = '';
      if (state.sessions.length === 0) {
        const empty = document.createElement('div');
        empty.style.cssText = 'padding:20px;text-align:center;font-size:13px;opacity:0.4;';
        empty.textContent = '暂无对话历史';
        sessionList.appendChild(empty);
        return;
      }
      state.sessions.forEach(s => {
        const item = document.createElement('div');
        item.className = 'session-item' + (s.session_id === state.sessionId ? ' active' : '');
        item.title = s.session_id;
        item.innerHTML = `
          <span class="session-icon">💬</span>
          <span class="session-preview">${escapeHtml(truncate(s.latest_question, 30) || '新对话')}</span>
          <span class="session-time">${formatTime(s.latest_time)}</span>
          <button class="btn-delete-session" data-sid="${escapeHtml(s.session_id)}">×</button>
        `;
        item.onclick = (e) => {
          if (e.target.classList.contains('btn-delete-session')) return;
          switchSession(s.session_id);
        };
        sessionList.appendChild(item);
      });

      // Delete buttons
      $$('.btn-delete-session').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const sid = btn.dataset.sid;
          await apiClearHistory(sid);
          if (sid === state.sessionId) {
            newSession();
          }
          await refreshSessions();
        };
      });
    }

    function updateWelcome() {
      welcomeScreen.style.display = state.messages.length === 0 ? '' : 'none';
    }

    function addMessage(role, content) {
      state.messages.push({ role, content });
      const row = document.createElement('div');
      row.className = 'msg-row ' + role;
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar ' + role;
      avatar.textContent = role === 'user' ? '👤' : '🤖';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      // Pre-render markdown for AI messages; plain text for user
      bubble.innerHTML = role === 'ai' ? renderMarkdown(content) : escapeHtml(content);
      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesInner.appendChild(row);
      updateWelcome();
      scrollToBottom();
      return { row, bubble };
    }

    // ========== Streaming / Typing animation ==========
    function startTypingAnimation() {
      const row = document.createElement('div');
      row.className = 'msg-row ai';
      row.id = 'streamingRow';
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar ai';
      avatar.textContent = '🤖';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.id = 'streamingBubble';
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesInner.appendChild(row);
      updateWelcome();
      scrollToBottom();
      return { row, bubble };
    }

    function updateStreamingBubble(bubble, text, isDone) {
      const mdHtml = renderMarkdown(text);
      bubble.innerHTML = mdHtml + (isDone ? '' : '<span class="cursor-blink"></span>');
    }

    function finishStreaming(text) {
      const row = document.getElementById('streamingRow');
      const bubble = document.getElementById('streamingBubble');
      if (row) row.removeAttribute('id');
      if (bubble) {
        bubble.removeAttribute('id');
        bubble.innerHTML = renderMarkdown(text);
      }
      state.messages.push({ role: 'ai', content: text });
      updateWelcome();
      scrollToBottom();
    }

    function removeStreamingRow() {
      const row = document.getElementById('streamingRow');
      if (row) row.remove();
    }

    // ========== Send Message ==========
    async function sendMessage() {
      const query = queryInput.value.trim();
      if (!query || state.isLoading) return;

      state.isLoading = true;
      btnSend.disabled = true;
      queryInput.value = '';
      queryInput.style.height = 'auto';

      // Add user message
      addMessage('user', query);

      // Add typing indicator
      const { bubble } = startTypingAnimation();

      try {
        const resp = await apiChat(query, state.sourceFilter, state.sessionId);
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // Parse SSE events
          const lines = buffer.split('\n');
          buffer = '';
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.token) {
                  fullText += data.token;
                  updateStreamingBubble(bubble, fullText, false);
                }
                if (data.done) {
                  finishStreaming(fullText);
                  // Update session_id if new
                  if (data.session_id && data.session_id !== state.sessionId) {
                    state.sessionId = data.session_id;
                    renderSessionId();
                  }
                }
              } catch { /* incomplete JSON, continue */ }
            } else if (line === '') {
              // SSE event boundary
            } else {
              buffer += line + '\n';
            }
          }
        }
      } catch (err) {
        removeStreamingRow();
        addMessage('ai', '⚠️ 请求失败: ' + err.message);
        toast('网络错误，请重试');
      }

      // Refresh sessions list
      await refreshSessions();
      state.isLoading = false;
      btnSend.disabled = false;
      queryInput.focus();
    }

    // ========== Session Management ==========
    function newSession() {
      state.sessionId = genSessionId();
      state.messages = [];
      messagesInner.innerHTML = '';
      // Re-add welcome screen
      const welcome = document.createElement('div');
      welcome.className = 'welcome';
      welcome.id = 'welcomeScreen';
      welcome.innerHTML = `
        <div class="welcome-logo">🎓</div>
        <h1>EduRAG 智慧问答</h1>
        <p class="slogan">教育领域的智能知识助手，快速精准解答您的学习疑问</p>
        <div class="welcome-cards" id="welcomeCards"></div>
      `;
      messagesInner.appendChild(welcome);
      renderWelcomeCards();
      renderSessionId();
      updateWelcome();
      scrollToBottom();
    }

    async function switchSession(sid) {
      state.sessionId = sid;
      state.messages = [];
      messagesInner.innerHTML = '';
      // Welcome will be re-shown if no history
      const welcome = document.createElement('div');
      welcome.className = 'welcome';
      welcome.id = 'welcomeScreen';
      welcome.innerHTML = `
        <div class="welcome-logo">🎓</div>
        <h1>EduRAG 智慧问答</h1>
        <p class="slogan">教育领域的智能知识助手，快速精准解答您的学习疑问</p>
        <div class="welcome-cards" id="welcomeCards"></div>
      `;
      messagesInner.appendChild(welcome);
      renderWelcomeCards();

      // Load history
      try {
        const data = await apiHistory(sid);
        if (data.history && data.history.length > 0) {
          // Remove welcome and add messages
          welcome.remove();
          data.history.forEach(h => {
            if (h.question) addMessage('user', h.question);
            if (h.answer) addMessage('ai', h.answer);
          });
        }
      } catch { /* ignore */ }

      renderSessionId();
      renderSessionList();
      updateWelcome();
      scrollToBottom();
      // Close sidebar on mobile
      if (window.innerWidth <= 768) closeSidebar();
    }

    async function refreshSessions() {
      try {
        state.sessions = await apiConversations();
        renderSessionList();
      } catch { /* ignore */ }
    }

    async function clearCurrentSession() {
      if (!state.sessionId) return;
      if (!confirm('确定要清空此对话的全部历史记录吗？此操作不可撤销。')) return;
      await apiClearHistory(state.sessionId);
      state.messages = [];
      messagesInner.innerHTML = '';
      const welcome = document.createElement('div');
      welcome.className = 'welcome';
      welcome.id = 'welcomeScreen';
      welcome.innerHTML = `
        <div class="welcome-logo">🎓</div>
        <h1>EduRAG 智慧问答</h1>
        <p class="slogan">教育领域的智能知识助手，快速精准解答您的学习疑问</p>
        <div class="welcome-cards" id="welcomeCards"></div>
      `;
      messagesInner.appendChild(welcome);
      renderWelcomeCards();
      updateWelcome();
      await refreshSessions();
      toast('对话已清空');
    }

    // ========== Sidebar Toggle (Mobile) ==========
    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('show');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('show');
    }

    // ========== Auto-resize textarea ==========
    function autoResize() {
      queryInput.style.height = 'auto';
      queryInput.style.height = Math.min(queryInput.scrollHeight, 150) + 'px';
      btnSend.disabled = queryInput.value.trim().length === 0 || state.isLoading;
    }

    // ========== Event Listeners ==========
    queryInput.addEventListener('input', autoResize);
    queryInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
        e.preventDefault();
        newSession();
        refreshSessions();
        toast('已创建新对话');
      }
    });

    btnSend.addEventListener('click', sendMessage);
    $('#btnNewChat').addEventListener('click', () => {
      newSession();
      refreshSessions();
      if (window.innerWidth <= 768) closeSidebar();
    });
    $('#btnClearSession').addEventListener('click', clearCurrentSession);
    $('#btnMenu').addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
    sidebarOverlay.addEventListener('click', closeSidebar);

    // ========== Init ==========
    async function init() {
      state.sources = await apiSources();
      state.sessionId = genSessionId();
      renderSources();
      renderWelcomeCards();
      renderSessionId();
      updateWelcome();
      await refreshSessions();

      // Auto-resize handler after init
      queryInput.focus();
    }

    init().catch(err => {
      console.error('Initialization failed:', err);
      toast('初始化失败，请确认服务已启动');
    });
  })();
  </script>
</body>
</html>
